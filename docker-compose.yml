services:
  mirastock:
    build: .
    ports:
      - "8002:8001"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/mirastock.db
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - default
      - caddy-net

networks:
  caddy-net:
    external: true
    name: mirastock-actualizado_default
