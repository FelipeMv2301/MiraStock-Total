services:
  app:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/mirastock.db
    volumes:
      - ./data:/data
      # Código montado desde el repo: git pull actualiza sin rebuild.
      # Cambios en .py requieren "docker compose restart app"; los
      # estáticos (js/html/css) se sirven directo del disco.
      - ./app:/app/app
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
